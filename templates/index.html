<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golden East Parking Lot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="stage">
    <img src="/static/images/stage_.gif" id="stage-bg">

    <img id="car" class="entity" src="/static/images/lambodown.png">

    <img id="character" class="entity" style="display:none;" src="/static/images/character_down_1.png">

    <div id="chat-container" style="position: absolute; bottom: 20px; left: 20px; width: 300px; z-index: 9999; display: none; flex-direction: column;">
        <div id="chat-box" style="height: 150px; background: rgba(0, 0, 0, 0.8); color: #00ff00; overflow-y: auto; padding: 10px; border: 2px solid #00ff00; font-family: monospace; margin-bottom: 5px; border-radius: 5px;">
            <div>System: Press 0 to focus chat, 9 to hide.</div>
        </div>
        <input type="text" id="chat-input" placeholder="Type message..." maxlength="50" 
               style="width: 100%; padding: 10px; background: white; color: black; border: none; border-radius: 5px; box-sizing: border-box; outline: none;">
    </div>
</div>

<audio id="bgm" src="/static/music.mp3"></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/static/game.js"></script>

</body>
</html>
